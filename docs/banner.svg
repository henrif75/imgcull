<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stars" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="8" />

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60" />
    <line x1="0" y1="120" x2="1200" y2="120" />
    <line x1="0" y1="180" x2="1200" y2="180" />
    <line x1="0" y1="240" x2="1200" y2="240" />
    <line x1="200" y1="0" x2="200" y2="300" />
    <line x1="400" y1="0" x2="400" y2="300" />
    <line x1="600" y1="0" x2="600" y2="300" />
    <line x1="800" y1="0" x2="800" y2="300" />
    <line x1="1000" y1="0" x2="1000" y2="300" />
  </g>

  <!-- Decorative image frame icons (left side) -->
  <!-- Frame 1 -->
  <g transform="translate(60, 85)" opacity="0.15">
    <rect x="0" y="0" width="80" height="60" rx="4" fill="none" stroke="#e67e22" stroke-width="2" />
    <circle cx="25" cy="20" r="8" fill="none" stroke="#e67e22" stroke-width="1.5" />
    <polyline points="10,50 30,30 50,42 65,28 75,38" fill="none" stroke="#e67e22" stroke-width="1.5" />
  </g>

  <!-- Frame 2 -->
  <g transform="translate(80, 155)" opacity="0.10">
    <rect x="0" y="0" width="65" height="48" rx="3" fill="none" stroke="#f39c12" stroke-width="1.5" />
    <circle cx="20" cy="16" r="6" fill="none" stroke="#f39c12" stroke-width="1.2" />
    <polyline points="8,40 22,26 38,34 52,22 60,30" fill="none" stroke="#f39c12" stroke-width="1.2" />
  </g>

  <!-- Main title -->
  <text x="360" y="125" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-2">
    imgcull
  </text>

  <!-- Accent bar under title -->
  <rect x="362" y="140" width="120" height="3" rx="1.5" fill="url(#accent)" />

  <!-- Tagline -->
  <text x="362" y="175" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#8a8a9a" letter-spacing="0.5">
    AI-powered image culling with vision LLMs
  </text>

  <!-- Star rating visualization -->
  <g transform="translate(362, 200)">
    <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="url(#stars)" />
    <polygon points="40,2 43,9 50,9 44,14 46,21 40,17 34,21 36,14 30,9 37,9" fill="url(#stars)" />
    <polygon points="68,2 71,9 78,9 72,14 74,21 68,17 62,21 64,14 58,9 65,9" fill="url(#stars)" />
    <polygon points="96,2 99,9 106,9 100,14 102,21 96,17 90,21 92,14 86,9 93,9" fill="url(#stars)" />
    <polygon points="124,2 127,9 134,9 128,14 130,21 124,17 118,21 120,14 114,9 121,9" fill="#2a2a3e" />
  </g>

  <!-- Tech badges -->
  <g transform="translate(362, 238)">
    <rect x="0" y="0" width="52" height="22" rx="4" fill="#2a2a3e" />
    <text x="26" y="15" font-family="monospace" font-size="11" fill="#e67e22" text-anchor="middle">Rust</text>

    <rect x="62" y="0" width="48" height="22" rx="4" fill="#2a2a3e" />
    <text x="86" y="15" font-family="monospace" font-size="11" fill="#e67e22" text-anchor="middle">XMP</text>

    <rect x="120" y="0" width="48" height="22" rx="4" fill="#2a2a3e" />
    <text x="144" y="15" font-family="monospace" font-size="11" fill="#e67e22" text-anchor="middle">LLM</text>
  </g>

  <!-- Decorative elements (right side) -->
  <!-- AI/neural network nodes -->
  <g transform="translate(900, 80)" opacity="0.12">
    <circle cx="0" cy="0" r="5" fill="#e67e22" />
    <circle cx="60" cy="-20" r="4" fill="#f39c12" />
    <circle cx="80" cy="30" r="5" fill="#e67e22" />
    <circle cx="40" cy="50" r="3" fill="#f39c12" />
    <circle cx="120" cy="10" r="4" fill="#e67e22" />
    <circle cx="100" cy="70" r="3" fill="#f39c12" />
    <circle cx="160" cy="50" r="5" fill="#e67e22" />
    <circle cx="140" cy="100" r="4" fill="#f39c12" />
    <circle cx="60" cy="90" r="3" fill="#e67e22" />
    <line x1="0" y1="0" x2="60" y2="-20" stroke="#e67e22" stroke-width="0.8" />
    <line x1="0" y1="0" x2="40" y2="50" stroke="#e67e22" stroke-width="0.8" />
    <line x1="60" y1="-20" x2="80" y2="30" stroke="#f39c12" stroke-width="0.8" />
    <line x1="60" y1="-20" x2="120" y2="10" stroke="#e67e22" stroke-width="0.8" />
    <line x1="80" y1="30" x2="120" y2="10" stroke="#f39c12" stroke-width="0.8" />
    <line x1="80" y1="30" x2="40" y2="50" stroke="#e67e22" stroke-width="0.8" />
    <line x1="120" y1="10" x2="160" y2="50" stroke="#e67e22" stroke-width="0.8" />
    <line x1="40" y1="50" x2="60" y2="90" stroke="#f39c12" stroke-width="0.8" />
    <line x1="100" y1="70" x2="160" y2="50" stroke="#f39c12" stroke-width="0.8" />
    <line x1="100" y1="70" x2="140" y2="100" stroke="#e67e22" stroke-width="0.8" />
    <line x1="60" y1="90" x2="140" y2="100" stroke="#f39c12" stroke-width="0.8" />
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="294" width="1200" height="6" fill="url(#accent)" rx="0" />
</svg>
